
<style>
#erd { padding: 8px 0; overflow-x: auto; }
#erd svg { max-width: 100%; height: auto; }
.legend { font-size: 12px; color: var(--color-text-secondary); margin: 16px 0 0; line-height: 1.8; display: flex; flex-wrap: wrap; gap: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; }
</style>
<div id="erd"></div>
<div class="legend">
  <span style="font-size:13px; color: var(--color-text-primary); width:100%;">Legenda UML:</span>
  <span class="legend-item"><svg width="50" height="16"><line x1="0" y1="8" x2="35" y2="8" stroke="var(--color-text-secondary)" stroke-width="1.5"/><polygon points="35,4 43,8 35,12" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5"/></svg> Heranca</span>
  <span class="legend-item"><svg width="50" height="16"><line x1="12" y1="8" x2="50" y2="8" stroke="var(--color-text-secondary)" stroke-width="1.5"/><polygon points="0,8 12,2 12,14" fill="var(--color-text-secondary)"/></svg> Composicao</span>
  <span class="legend-item"><svg width="50" height="16"><line x1="12" y1="8" x2="50" y2="8" stroke="var(--color-text-secondary)" stroke-width="1.5"/><polygon points="0,8 12,2 12,14" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.5"/></svg> Agregacao</span>
  <span class="legend-item"><svg width="50" height="16"><line x1="0" y1="8" x2="50" y2="8" stroke="var(--color-text-secondary)" stroke-width="1.5"/></svg> Associacao</span>
  <span class="legend-item"><svg width="50" height="16"><line x1="0" y1="8" x2="40" y2="8" stroke="var(--color-text-secondary)" stroke-width="1.5" stroke-dasharray="5,3"/><polygon points="40,4 48,8 40,12" fill="none" stroke="var(--color-text-secondary)" stroke-width="1.2"/></svg> Dependencia</span>
  <span style="font-size:11px; color: var(--color-text-tertiary); width:100%;"># = protegido | + = publico | Tipos Python: str, int, float, bool, date</span>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '11px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `classDiagram
    direction TB

    class Pessoa {
        # nome : str
        # cpf : str
        # data_nascimento : date
        # telefone : str
        # email : str
        # endereco : str
    }

    class Funcionario {
        # matricula_funcionario : str
        # cargo : str
        # data_admissao : date
    }

    class Professor {
        # formacao : str
        # titulacao : str
        + registrar_nota(matricula, materia, bimestre, valor) bool
        + registrar_frequencia(matricula, materia, data, presente) bool
        + editar_frequencia(matricula, materia, data, presente) bool
        + adicionar_materia(materia) void
        + remover_materia(materia) void
    }

    class Secretaria {
        # setor : str
        + cadastrar_aluno(dados) bool
        + editar_aluno(cpf, dados) bool
        + consultar_aluno(cpf) Aluno
        + cadastrar_funcionario(dados) bool
        + editar_funcionario(matricula, dados) bool
        + consultar_funcionario(matricula) Funcionario
        + efetuar_matricula(aluno, turma) Matricula
        + cancelar_matricula(matricula) bool
        + transferir_matricula(matricula, turma_destino) bool
        + emitir_historico(aluno) HistoricoEscolar
        + gerar_relatorio_turma(turma) list
        + gerar_relatorio_professores(serie) list
    }

    class Coordenador {
        # area : str
        + cadastrar_serie(dados) Serie
        + cadastrar_turma(dados_com_capacidade) Turma
        + cadastrar_materia(dados) Materia
        + atribuir_professor_materia(professor, materia, turma) bool
        + editar_serie(codigo, dados) bool
        + editar_turma(codigo, dados) bool
        + editar_materia(codigo, dados) bool
    }

    class Aluno {
        # matricula_aluno : str
        # data_matricula : date
        # responsavel : str
        # telefone_responsavel : str
        + consultar_boletim(matricula) Boletim
        + consultar_historico() HistoricoEscolar
        + adicionar_matricula(matricula) void
        + remover_matricula(matricula) void
        + adicionar_historico(historico) void
    }

    class Usuario {
        # login : str
        # senha_hash : str
        # perfil : str
        # ativo : bool
        + autenticar(login, senha) bool
        + alterar_senha(senha_atual, nova_senha) bool
        + desativar() void
    }

    class Serie {
        # codigo : str
        # nome : str
        # nivel : str
        + adicionar_turma(turma) void
        + remover_turma(turma) void
        + listar_turmas() list
    }

    class Turma {
        # codigo : str
        # nome : str
        # turno : str
        # ano_letivo : int
        # capacidade_maxima : int
        # total_alunos : int
        + adicionar_matricula(matricula) bool
        + remover_matricula(matricula) void
        + adicionar_materia(materia) void
        + remover_materia(materia) void
        + verificar_capacidade() bool
    }

    class Materia {
        # codigo : str
        # nome : str
        # carga_horaria : int
    }

    class Matricula {
        # codigo : str
        # data_matricula : date
        # status : str
        # data_transferencia : date
        # data_cancelamento : date
        + cancelar() void
        + transferir(turma_destino) void
        + criar_boletim() Boletim
        + adicionar_frequencia(frequencia) void
    }

    class Nota {
        # bimestre : int
        # valor : float
        # data_lancamento : date
        + validar_nota() bool
    }

    class Frequencia {
        # data_aula : date
        # presente : bool
        # justificativa : str
        # data_registro : date
        # editado : bool
        # data_edicao : date
        + registrar_presenca() void
        + registrar_falta(justificativa) void
        + editar_registro(presente, justificativa) void
        + validar_edicao(data_aula) bool
    }

    class Boletim {
        # media_final : float
        # frequencia_percentual : float
        # situacao : str
        # ano_letivo : int
        + adicionar_nota(nota) void
        + remover_nota(nota) void
        + calcular_media_final() float
        + calcular_frequencia_percentual(frequencias) float
        + determinar_situacao() str
    }

    class HistoricoEscolar {
        # data_emissao : date
        + adicionar_boletim(boletim) void
        + remover_boletim(boletim) void
        + gerar_historico_completo() dict
    }

    Pessoa <|-- Funcionario
    Pessoa <|-- Aluno
    Funcionario <|-- Professor
    Funcionario <|-- Secretaria
    Funcionario <|-- Coordenador

    Pessoa "1" --> "1" Usuario : possui

    Serie "1" *-- "1..*" Turma : compoe
    Turma "1" *-- "0..*" Matricula : compoe
    Aluno "1" *-- "0..*" Matricula : compoe

    Matricula "1" *-- "1" Boletim : compoe
    Matricula "1" *-- "0..*" Frequencia : compoe

    Boletim "1" *-- "1..*" Nota : compoe

    Nota "0..*" --> "1" Materia : referente
    Frequencia "0..*" --> "1" Materia : referente

    Professor "1" --> "1..*" Materia : leciona
    Turma "1" --> "1..*" Materia : oferece

    Aluno "1" o-- "0..*" HistoricoEscolar : possui
    HistoricoEscolar "1" o-- "1..*" Boletim : agrega

    Secretaria ..> Matricula : efetua
    Secretaria ..> Aluno : cadastra
    Secretaria ..> Funcionario : cadastra
    Secretaria ..> HistoricoEscolar : emite
    Professor ..> Nota : registra
    Professor ..> Frequencia : registra/edita
    Coordenador ..> Serie : cadastra
    Coordenador ..> Turma : cadastra
    Coordenador ..> Materia : cadastra
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
